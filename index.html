<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Todo List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container hello">
      <h1>Todo List</h1>
      <!-- <form id="todoForm"> -->
        <input type="text" id="todoInput" placeholder="Add new todo" required />
        <button onclick="getvalue()">Add</button>
      <!-- </form> -->
      <ul id="todoList"></ul>
      <div id="stats unique">
        <p>Total: <span id="total">0</span></p>
        <p id=>Completed: <span id="completed">0</span></p>
      </div>
      <ul id="todos"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
